<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>愚人节小游戏合集</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #333;
            font-size: 2.5rem; /* 更大的标题 */
            margin-bottom: 30px;
            text-align: center;
        }
        .game-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 600px;
            width: 100%;
            align-items: center;
        }
        .game-links a {
            text-decoration: none;
            color: #007BFF;
            font-size: 1.8rem; /* 更大的链接文字 */
            padding: 14px 24px;
            border: 2px solid #007BFF;
            border-radius: 10px;
            background-color: #fff;
            transition: all 0.2s ease;
            width: fit-content;
            text-align: center;
        }
        .game-links a:hover {
            background-color: #e6f2ff;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
<h1>愚人节小游戏合集</h1>
<div class="game-links" id="linksContainer"></div>

    <script>
        const startYear = 2026;
        const skippedYears = new Set([]);

        const container = document.getElementById('linksContainer');

        const pathParts = window.location.pathname.split('/').slice(0, -1);
        const basePath = window.location.origin + pathParts.join('/') + '/';

        function updateLinks() {
            container.innerHTML = '';

            const now = new Date();
            let endYear;
            const month = now.getMonth();
            const date = now.getDate();
            const hours = now.getHours();

            if (month > 2 || (month === 2 && date === 31 && hours >= 20)) {
                endYear = now.getFullYear();
            } else {
                endYear = now.getFullYear() - 1;
            }

            endYear = Math.max(endYear, startYear);

            for (let year = startYear; year <= endYear; year++) {
                if (skippedYears.has(year)) continue;

                const link = document.createElement('a');
                link.href = basePath + year;
                link.target = '_blank';
                link.textContent = `${year}`;
                link.style.display = 'block';
                container.appendChild(link);
            }
        }

        updateLinks();
        setInterval(updateLinks, 1000);
    </script>
</body>
</html>
